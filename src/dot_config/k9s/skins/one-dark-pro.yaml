        fgColor: "#c678dd"
        bgColor: "#282c34"
        sorterColor: "#61afef"
    xray:
      fgColor: "#abb2bf"
      bgColor: "#282c34"
      cursorColor: "#3e4452"
      graphicColor: "#61afef"
      showColor: "#98c379"
    yaml:
      keyColor: "#61afef"
      colonColor: "#636d83"
      valueColor: "#abb2bf"
