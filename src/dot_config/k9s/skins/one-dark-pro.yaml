# One Dark Pro skin for k9s

k9s:
  body:
    fgColor: "#abb2bf"
    bgColor: "#282c34"
    logoColor: "#61afef"
  prompt:
    fgColor: "#abb2bf"
    bgColor: "#282c34"
    suggestColor: "#d19a66"
  info:
    fgColor: "#c678dd"
    sectionColor: "#98c379"
  dialog:
    fgColor: "#abb2bf"
    bgColor: "#3e4452"
    buttonFgColor: "#282c34"
    buttonBgColor: "#61afef"
    buttonFocusFgColor: "#282c34"
    buttonFocusBgColor: "#c678dd"
    labelFgColor: "#d19a66"
    fieldFgColor: "#abb2bf"
  frame:
