      fgColor: "#636d83"
      focusColor: "#61afef"
    menu:
      fgColor: "#abb2bf"
      keyColor: "#c678dd"
      numKeyColor: "#d19a66"
    crumbs:
      fgColor: "#282c34"
      bgColor: "#61afef"
      activeColor: "#c678dd"
    status:
      newColor: "#98c379"
      modifyColor: "#e5c07b"
