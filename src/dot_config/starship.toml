# Starship prompt configuration
# https://starship.rs/config/
# starship 1.24.2
"$schema" = 'https://starship.rs/config-schema.json'

#########################
#    General Options    #
#########################

# Timeout for file scanning, in milliseconds (default: 30)
# scan_timeout = 30

# Timeout for commands executed by starship, in milliseconds (default: 500)
command_timeout = 5000

# Inserts blank line between shell prompts (default: true)
add_newline = true

# A continuation prompt that displays two filled in arrows
continuation_prompt = 'Ō¢ČŌ¢Č '

# Follow symbolic links when checking file/directory conditions (default: true)
# follow_symlinks = true

# Prompt format ŌĆö controls the overall prompt layout (default: '$all')
# format = '$all'

# Right-aligned prompt format (default: '')
# right_format = ''

# Color palette ŌĆö select a named palette from [palettes] (default: '')
# palette = ''

# Custom color palettes ŌĆö define named colors for reuse
# [palettes.catppuccin_mocha]
# rosewater = "#f5e0dc"
# flamingo = "#f2cdcd"
# pink = "#f5c2e7"
# mauve = "#cba6f7"
# red = "#f38ba8"
# maroon = "#eba0ac"
# peach = "#fab387"
# yellow = "#f9e2af"
# green = "#a6e3a1"
# teal = "#94e2d5"
# sky = "#89dceb"
# sapphire = "#74c7ec"
# blue = "#89b4fa"
# lavender = "#b4befe"
# text = "#cdd6f4"
# subtext1 = "#bac2de"
# subtext0 = "#a6adc8"
# overlay2 = "#9399b2"
# overlay1 = "#7f849c"
# overlay0 = "#6c7086"
# surface2 = "#585b70"
# surface1 = "#45475a"
# surface0 = "#313244"
# base = "#1e1e2e"
# mantle = "#181825"
# crust = "#11111b"

# Environment variable display
# [env_var.USER]
# https://starship.rs/config/#environment-variable
# symbol = ""
# variable = "USER"
# default = "unknown user"
# format = "with [$env_value]($style) "
# disabled = false

[character]
# https://starship.rs/config/#character
success_symbol = '[’╝ä](bold green)'
error_symbol = '[’╝ä](bold red)'
vimcmd_symbol = '[ŌØ«](bold green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold purple)'
vimcmd_replace_symbol = '[ŌØ«](bold purple)'
vimcmd_visual_symbol = '[ŌØ«](bold yellow)'

#########################
# Module Configuration #
#########################

# -- Common Modules --

[directory]
# https://starship.rs/config/#directory
truncation_length = 3
truncate_to_repo = true
format = '[$path]($style)[$read_only]($read_only_style) '
read_only = " ¾░īŠ"
read_only_style = "red"
style = "bold cyan"
repo_root_style = "bold yellow"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
home_symbol = "home"
use_os_path_sep = true
use_logical_path = true

[cmd_duration]
# https://starship.rs/config/#cmd_duration
min_time = 500
format = 'underwent [$duration](bold yellow)'

[directory.substitutions]
# https://starship.rs/config/#directory.substitutions
'/usr/local/go' = 'GOROOT'

[hostname]
# https://starship.rs/config/#hostname
ssh_symbol = "Ņ¼ü "
ssh_only = true
trim_at = "."
format = "[$ssh_symbol$hostname]($style) in "

[jobs]
# https://starship.rs/config/#jobs
# symbol = "Ō£”"
# number_threshold = 1
# symbol_threshold = 1
# format = "[$symbol$number]($style) "
# style = "bold blue"

[localip]
# https://starship.rs/config/#localip
ssh_only = true
format = "[$local_ipv4]($style) "
style = "bold yellow"

[os]
# https://starship.rs/config/#os
format = "[$symbol]($style)"
style = "bold white"

